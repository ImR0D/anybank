<aside class="extrato">
  <h2 class="titulo">Extrato</h2>
  <ul class="transacoes">
    @for (transacao of transacoes(); track transacao.id) {
      <li>
        <app-transacao [transactionItem]="transacao" />
      </li>
    } @empty {
      <li aria-hidden="true" class="nenhuma_transacao">
        Nenhuma transação identificada até o momento
      </li>
    }
  </ul>
</aside>
